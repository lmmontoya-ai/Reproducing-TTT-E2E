    extra_overrides: []
    notes: S2 warm-started TTT-E2E extension.

  - stage_id: S3_PRETRAIN_E2E
    name: From-scratch TTT-E2E pretrain
    kind: pretrain
    model_key: in_family_760m
    path_group: scratch
    experiment: 760m/pretrain/pretrain-760m-e2e
