# @package _global_
#
# Q-S2: E2E extension to 32K from the warm-start bridge.
# Load the adapted Q-S2_ADAPT checkpoint and extend to 32K context with
# meta-learning. This produces the final Phase 2 quality measurement:
# "How well does the warm-started Qwen-based TTT-E2E model handle long context?"
defaults:
  - override /training: qwen2_5_1_5b/ext
  - override /model: qwen2_5_1_5b
  - _self_

training:
  exp_name: ext-qwen15-e2e-32K-from-import-bridge
  seq_length: 32768
  global_batch_size: 16
  load_part: params
  resume_exp_name: adapt-qwen15-e2e-8K-from-import
  train_mode: meta
  spec_inner: ["language_model.**.suffix_blocks.feed_forward_prime.**"]
  ilr_init: 1
  optimizer_inner:
    optimizer_type: sgd
    lr: 1
    clip_gradient: 1.0
  init_source: external_hf
  external_model_id: Qwen/Qwen2.5-1.5B
  external_profile_path: ./artifacts/external_models/qwen2_5_1_5b/model_profile.json
  adapter_recipe: ttt_bridge

model:
  seq_modeling_block: SWA
  force_flash: False
  unroll_block_scan: True
  mini_batch_size: 1024
  sliding_window_size: 8192
  rope_theta: 1000000
  prime: True
  suffix_len: 7
  feed_forward_prime: swiglu
  intermediate_size: 7258
  attention_pattern: ttt_swa
