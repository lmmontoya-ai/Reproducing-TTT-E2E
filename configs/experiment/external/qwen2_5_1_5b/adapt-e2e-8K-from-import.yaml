# @package _global_
#
# Q-S2_ADAPT: Warm-start E2E adaptation bridge at 8K.
# Load SWA-bridged Qwen2.5-1.5B weights, add prime MLPs to suffix blocks (last
# 7 of 28 layers = 25%), enable TTT meta-learning. This is THE core experiment:
# can meta-learning teach randomly-initialized prime MLPs to cooperate with
# pretrained Qwen weights?
#
# Budget: 10% of Chinchilla-optimal pretrain steps (~12K * 0.1 if matching 0.5B,
# or ~3B tokens at batch=32, seq=8K). Adjust total_steps in the training config
# override below as needed.
defaults:
  - override /training: qwen2_5_1_5b/pretrain-8K
  - override /model: qwen2_5_1_5b
  - _self_

training:
  exp_name: adapt-qwen15-e2e-8K-from-import
  load_part: params
  resume_exp_name: adapt-qwen15-swa-8K-from-import
  train_mode: meta
  spec_inner: ["language_model.**.suffix_blocks.feed_forward_prime.**"]
  ilr_init: 0.1
  optimizer_inner:
    optimizer_type: sgd
    lr: 1
    clip_gradient: 1.0
  init_source: external_hf
  external_model_id: Qwen/Qwen2.5-1.5B
  external_profile_path: ./artifacts/external_models/qwen2_5_1_5b/model_profile.json
  adapter_recipe: ttt_bridge

model:
  seq_modeling_block: SWA
  force_flash: False
  unroll_block_scan: True
  mini_batch_size: 1024
  sliding_window_size: 8192
  rope_theta: 1000000
  prime: True
  suffix_len: 7
  feed_forward_prime: swiglu
  intermediate_size: 7258
  attention_pattern: ttt_swa
