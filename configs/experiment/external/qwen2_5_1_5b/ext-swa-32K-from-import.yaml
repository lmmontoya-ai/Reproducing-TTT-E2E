# @package _global_
#
# Q-S1: Naive SWA extension to 32K (negative control).
# Load imported Qwen2.5-1.5B FA weights, switch attention to SWA, extend to 32K
# in standard pretrain mode (no meta-learning). Expected: quality degradation
# from losing full-context attention, proving the warm-start bridge is necessary.
defaults:
  - override /training: qwen2_5_1_5b/ext
  - override /model: qwen2_5_1_5b
  - _self_

training:
  exp_name: ext-qwen15-swa-32K-from-import
  seq_length: 32768
  global_batch_size: 16
  load_part: params
  resume_exp_name: import-qwen15-fa-base
  train_mode: pretrain
  init_source: external_hf
  external_model_id: Qwen/Qwen2.5-1.5B
  external_profile_path: ./artifacts/external_models/qwen2_5_1_5b/model_profile.json
  adapter_recipe: swa_naive

model:
  seq_modeling_block: SWA
  force_flash: False
  unroll_block_scan: True
  mini_batch_size: 2048
  sliding_window_size: 8192
  rope_theta: 1000000
  prime: False
  suffix_len: 0
  attention_pattern: swa
