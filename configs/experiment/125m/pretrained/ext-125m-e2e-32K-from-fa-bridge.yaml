# @package _global_
defaults:
  - override /training: 125m/ext
  - override /model: 125m
  - _self_

training:
  exp_name: ext-125m-e2e-32K-from-fa-bridge
  seq_length: 32768
  global_batch_size: 32
  # Bridge warm-start: FA pretrain -> 8K meta adaptation -> 32K extension.
  load_part: params
  resume_exp_name: adapt-125m-e2e-8K-from-fa
  train_mode: meta
  spec_inner: ["language_model.**.suffix_blocks.feed_forward_prime.**"]
  ilr_init: 1
  optimizer_inner:
    optimizer_type: sgd
    lr: 1
    clip_gradient: 1.0

model:
  seq_modeling_block: SWA
  force_flash: False
  unroll_block_scan: True
  mini_batch_size: 1024
  sliding_window_size: 8192
  rope_theta: 500000
  prime: True
  suffix_len: 3
  intermediate_size: 1664
